services:
  migrator:
    build:
      context: .
      target: migrator
    restart: "no"
    env_file:
      - .env
    networks:
      - dokploy-network

  api:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      migrator:
        condition: service_completed_successfully
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
